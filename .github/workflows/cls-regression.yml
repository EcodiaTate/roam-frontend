name: CLS Regression

# Run when a PR touches any of the four CLS-fixed surfaces.
on:
  pull_request:
    paths:
      - 'src/components/nav/**'
      - 'src/components/places/**'
      - 'src/app/globals.css'

jobs:
  cls:
    name: CLS regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run test:cls:install

      - name: Build app
        run: npm run build

      # Playwright config detects CI=true and starts vite preview automatically.
      # ROAM_BASE_URL is left unset so the config default (http://localhost:4173) is used.
      - name: Run CLS regression suite
        run: npm run test:cls
        env:
          CI: 'true'
          # nav-hud.spec.ts runs unconditionally.
          # trip-map and place-detail skip unless these are set.
          # Configure as repository secrets for full coverage:
          #   ROAM_TEST_TRIP_ID       — Supabase UUID of a fixture trip plan
          #   ROAM_TEST_LAT           — Latitude of a fixture place
          #   ROAM_TEST_LNG           — Longitude of a fixture place
          #   ROAM_TEST_PLACE_NAME    — Display name for fixture place
          #   ROAM_TEST_SUPABASE_TOKEN — Optional auth bearer token
          ROAM_TEST_TRIP_ID: ${{ secrets.ROAM_TEST_TRIP_ID }}
          ROAM_TEST_LAT: ${{ secrets.ROAM_TEST_LAT }}
          ROAM_TEST_LNG: ${{ secrets.ROAM_TEST_LNG }}
          ROAM_TEST_PLACE_NAME: ${{ secrets.ROAM_TEST_PLACE_NAME }}
          ROAM_TEST_SUPABASE_TOKEN: ${{ secrets.ROAM_TEST_SUPABASE_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
